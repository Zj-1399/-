<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>JavaScript基础知识联系</title>
  </head>
  <body>
    <h1>JavaScript基础知识联系</h1>
    <script>
      // 变量的定义
      var name = "Alice";
      let age = 30;
      const PI = 3.14;
      // 打印变量
      console.log("Name:",name);
      console.log("Age:",age);
      console.log("PI:",PI);
      // 变量的类型
      console.log("Type of name",typeof name);
      console.log("Type of age",typeof age);
      console.log("Type of PI",typeof PI);
      // javaScript中的数据类型
      let isStudent = true; // boolean
      let score = null; // null
      let undefinedVar; // undefined
      console.log("i  sStudent",isStudent);
      console.log("score",score);
      console.log("undefinedVar",undefinedVar);
      // 运算符与表达式 （加上注释，请全面补全）
      let a = 10;
      let b = 5;
      // 加法
      console.log("a + b =", a + b);
      // 减法
      console.log("a - b =", a - b);
      // 乘法
      console.log("a * b =", a * b);
      // 除法
      console.log("a / b =", a / b);
      // 取余
      console.log("a % b =", a % b);

      //流程控制
      let score2 = 85;
      if (score2 >= 90) {
        console.log("优秀");
      } else if (score2 >= 60) {
        console.log("及格");
      } else {
        console.log("不及格");
      }
      // 循环控制
      console.log("For loop:");
      for (let i = 0; i < 5; i++) {
        console.log("i =", i);
      }
      console.log("While loop:");
      let j = 0;
      while (j < 5) {
        console.log("j =", j);
        j++;
      }

      //函数定义与调用
      function greet(name) {
        return "Hello, " + name + "!";
      }
      console.log(greet("Alice"));
      
    </script>
  </body>
</html>
